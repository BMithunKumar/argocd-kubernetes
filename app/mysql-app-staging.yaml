apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mysql-staging
  namespace: argo-cd
spec:
  project: default
  source:
    repoURL: https://github.com/your-username/your-repo.git
    targetRevision: HEAD
    path: helm/mysql-app
    helm:
      valueFiles:
        - values.yaml
        - values.staging.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
